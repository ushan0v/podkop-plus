name: Build packages
on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to build and publish
        required: true
        type: string

permissions:
  contents: write

jobs:
  preparation:
    name: Setup build version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v5.0.0
        with:
          fetch-depth: 0
      - id: version
        shell: bash
        run: |
          INPUT_VERSION="${{ inputs.release_tag || '' }}"
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION=$(git describe --tags --exact-match 2>/dev/null || echo "0.$(date +%d%m%Y)")
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build:
    name: Build Podkop Plus release packages
    runs-on: ubuntu-latest
    needs: preparation
    steps:
      - uses: actions/checkout@v5.0.0
        with:
          fetch-depth: 0

      - name: Build release artifacts
        shell: bash
        run: |
          VERSION="${{ needs.preparation.outputs.version }}"
          bash ./scripts/build-openwrt-packages-wsl.sh "$VERSION" "$PWD/filtered-bin/release"
          ls -la "$PWD/filtered-bin/release"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4.6.2
        with:
          name: release-files-${{ needs.preparation.outputs.version }}
          path: ./filtered-bin/release/*
          retention-days: 1
          if-no-files-found: error

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs:
      - preparation
      - build
    steps:
      - uses: actions/checkout@v5.0.0
      - name: Create release dir
        run: mkdir -p ./filtered-bin/release

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-files-${{ needs.preparation.outputs.version }}
          path: ./filtered-bin/release

      - name: Release
        uses: softprops/action-gh-release@v2.4.0
        with:
          files: ./filtered-bin/release/*.*
          draft: false
          prerelease: false
          name: ${{ needs.preparation.outputs.version }}
          tag_name: ${{ needs.preparation.outputs.version }}
